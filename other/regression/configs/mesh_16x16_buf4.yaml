# Deterministic regression base config for a 16x16 mesh with corner radio hubs.
topology: MESH
mesh_dim_x: 16
mesh_dim_y: 16
buffer_depth: 4
flit_size: 32
r2h_link_length: 2.0
r2r_link_length: 1.0
n_virtual_channels: 1

routing_algorithm: XY
routing_table_filename: ""
dyad_threshold: 0.6
selection_strategy: RANDOM

Hubs:
  defaults:
    rx_radio_channels: [0]
    tx_radio_channels: [0]
    attached_nodes: []
    to_tile_buffer_size: 4
    from_tile_buffer_size: 4
    rx_buffer_size: 4
    tx_buffer_size: 4
  0:
    attached_nodes: [0, 1, 16, 17]
  1:
    attached_nodes: [14, 15, 30, 31]
  2:
    attached_nodes: [224, 225, 240, 241]
  3:
    attached_nodes: [238, 239, 254, 255]

RadioChannels:
  defaults:
    data_rate: 16
    ber: [0, 0]
    mac_policy: [TOKEN_PACKET]

clock_period_ps: 1000
reset_time: 1000
simulation_time: 10000
stats_warm_up_time: 1000
detailed: false
max_volume_to_be_drained: 0
show_buffer_stats: false

use_winoc: false
winoc_dst_hops: 0
use_wirxsleep: false

verbose_mode: VERBOSE_OFF
trace_mode: false
trace_filename: ""

min_packet_size: 8
max_packet_size: 8
packet_injection_rate: 0.01
probability_of_retransmission: 0.01
traffic_distribution: TRAFFIC_RANDOM
traffic_table_filename: "t.txt"
traffic_hardcoded_filename: "t.txt"
rnd_generator_seed: 0
